<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>



<body class="bg-dark text-white mt-4 mb-4">
    <div class="_navbar"></div>
    <div class="container">
        <section>
            <div class="row alignment-center">
                <div class="col mt-4">
                    <div class="_card"></div>
                </div>
            </div>
        </section>
        <div class="_footer"></div>
    </div>
</body>

<script>
    fetch("/frontend/components/navbar.html")
    .then(res => res.text())
    .then(data => {
    document.querySelector("._navbar").innerHTML = data;
    });
</script>

<script>
    fetch("/frontend/components/card.html")
    .then(res => res.text())
    .then(data => {
    document.querySelector("._card").innerHTML = data;
    });
</script>

<script>
    fetch("/frontend/components/footer.html")
    .then(res => res.text())
    .then(data => {
    document.querySelector("._footer").innerHTML = data;
    });
</script>

</html>
